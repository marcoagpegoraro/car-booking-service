# This app properties file was created with the developer experience in mind, the developer does not need to
# set any environment variables because all the variables have a default value, which is the value necessary
# to run the application locally

# When the application is deployed, then the infrastructure as a code will inject all the variables necessary for the
# application to run in a specific environment, should this environment be the staging, production or any other environment.

#Microservice variables
spring.application.name=car-booking-service
server.port=${SERVER_PORT:8080}

# Database connection details
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:velocitymotorsdb}
spring.datasource.username=${DB_USER:velocitymotorsdbuser}
spring.datasource.password=${DB_PASSWORD:123}

# Hibernate DDL-auto property (optional but recommended)
# update: updates the schema to match entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Integrations
spring.cloud.openfeign.client.config.payment-service-client.url=${PAYMENT_SERVICE_URL:http://localhost:9090/host/credit-card-payment-api}
# Fail fast if the payment service is slow.
spring.cloud.openfeign.client.config.payment-service-client.connect-timeout=2000
spring.cloud.openfeign.client.config.payment-service-client.read-timeout=2000

# Circuit breaker (Resilience4j) around the payment service Feign client.
spring.cloud.openfeign.circuitbreaker.enabled=true
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3

# kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
kafka.group-id=${KAFKA_GROUP_ID:group_id}
kafka.topic-name=bank-transfer-payment-events

# Automatic cancellation of unpaid bank-transfer bookings
# Cron for the scheduled cancellation job (default: every day at 00:00).
booking.cancellation.cron=${BOOKING_CANCELLATION_CRON:0 0 0 * * *}
# A bank-transfer booking is cancelled if the full amount is not received at
# least this many hours before the rental start date.
booking.cancellation.payment-window-hours=${BOOKING_CANCELLATION_WINDOW_HOURS:48}