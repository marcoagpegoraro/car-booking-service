opencollection: 1.0.0
info:
  name: Car Booking Service
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ''
      port: ''
      auth:
        username: ''
        password: ''
      bypassProxy: ''
  environments:
    - name: dev
      variables:
        - name: baseURL
          value: http://localhost:8080
items:
  - info:
      name: Payment API NOT OK
      type: http
      seq: 10
    http:
      method: POST
      url: http://localhost:9090/host/credit-card-payment-api/payment-status
      body:
        type: json
        data: |-
          {
              "paymentReference": "DL987654321" 
          }
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: Payment API OK
      type: http
      seq: 9
    http:
      method: POST
      url: http://localhost:9090/host/credit-card-payment-api/payment-status
      body:
        type: json
        data: |-
          {
              "paymentReference": "DL123456789" 
          }
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: Post Booking Bank Transfer
      type: http
      seq: 4
    http:
      method: POST
      url: '{{baseURL}}/car-booking/confirm'
      body:
        type: json
        data: |-
          {
              "customerName": "Marco",
              "vehicleID": 80,
              "rentalStartDate": "2026-01-05T21:25:00+01:00",
              "rentalEndDate": "2026-01-10T21:25:00+01:00",
              "vehicleCategory": "LUXURY",
